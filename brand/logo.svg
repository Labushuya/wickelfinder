<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Wickelfinder – Wickelplatz-Finder Logo">
  <title>Wickelfinder</title>
  <desc>Standort-Pin in Indigo mit einem sitzenden Baby in soft Rosé; die Windel ist weiß hervorgehoben. Eigenständige Grafik.</desc>
  <defs>
    <linearGradient id="pinGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5B5BD6"/>
      <stop offset="1" stop-color="#4340B8"/>
    </linearGradient>
  </defs>

  <!-- Pin (eigene Tropfenkontur) -->
  <g transform="translate(73.6,6) scale(0.95)">
    <path d="M215.7 499.2C267 435 384 279.4 384 192C384 86 298 0 192 0S0 86 0 192c0 87.4 117 243 168.3 307.2c12.3 15.3 35.1 15.3 47.4 0z" fill="url(#pinGrad)"/>
  </g>

  <!-- Baby (eigene Glyphe), zentriert in der Pin-Bubble -->
  <g transform="translate(256,188) scale(0.54) translate(-256,-256)">
    <!-- Kopf -->
    <circle cx="256" cy="116" r="62" fill="#F6D9E4"/>
    <!-- Arme -->
    <path d="M256 250 C 196 250 150 226 120 190 C 104 172 104 146 126 140 C 144 135 158 150 176 164 C 198 180 226 190 256 190 C 286 190 314 180 336 164 C 354 150 368 135 386 140 C 408 146 408 172 392 190 C 362 226 316 250 256 250 Z" fill="#F6D9E4"/>
    <!-- Rumpf -->
    <path d="M196 198 Q 256 208 316 198 L 322 300 Q 256 292 190 300 Z" fill="#F6D9E4"/>
    <!-- Beine -->
    <path d="M214 298 C 176 306 158 356 176 404 C 186 430 226 424 224 396 C 222 360 232 328 256 314 Z" fill="#F6D9E4"/>
    <path d="M298 298 C 336 306 354 356 336 404 C 326 430 286 424 288 396 C 290 360 280 328 256 314 Z" fill="#F6D9E4"/>
    <!-- Windel (weiß) -->
    <path d="M186 286 Q 256 274 326 286 L 320 322 Q 292 316 274 336 Q 256 356 238 336 Q 220 316 192 322 Z" fill="#FFFFFF"/>
  </g>
</svg>
