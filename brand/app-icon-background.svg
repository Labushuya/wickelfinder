<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Wickelfinder App-Icon Hintergrund">
  <title>Wickelfinder – Adaptive Icon Background</title>
  <desc>Sanfter heller Hintergrund (surface zu accent-soft), damit der Indigo-Pin klar hervortritt.</desc>
  <defs>
    <!-- Weicher heller Verlauf: surface oben -> accent-soft unten. Full-bleed, keine Transparenz. -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBFAFF"/>
      <stop offset="1" stop-color="#F6D9E4"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bgGrad)"/>
</svg>
