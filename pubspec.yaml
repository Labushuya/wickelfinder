name: wickelfinder
description: "Wickelfinder – finde schnell Wickelplätze in deiner Nähe. Community-gepflegt, Open Source."
publish_to: "none"

# SemVer: MAJOR.MINOR.PATCH+BUILD
version: 0.18.0+42

environment:
  # supabase_flutter 2.16 verlangt Dart >=3.9 / Flutter >=3.35 (= CI-Pin 3.35.5).
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  # State Management – Golden Standard, testbar, kein BuildContext-Zwang
  flutter_riverpod: 2.5.1
  # Karte auf OpenStreetMap-Tiles, kein API-Key nötig
  flutter_map: 6.1.0
  latlong2: 0.9.1
  # Offline-Kachel-Cache fuer flutter_map (persistenter Datei-Store)
  flutter_map_cache: 2.1.0
  dio: 5.10.0
  dio_cache_interceptor: 4.0.7
  http_cache_file_store: 2.0.2
  # HTTP für Overpass API (>=1.2.2 wg. supabase_flutter)
  http: 1.6.0
  # Standortbestimmung (on-device, DSGVO-schonend)
  geolocator: 12.0.0
  # Community-Backend: Postgres + anonyme Auth + REST. Session persistiert intern.
  supabase_flutter: 2.16.0
  # In-App-Updater: aktuelle Version lesen, APK speichern, System-Installer oeffnen
  package_info_plus: 9.0.1
  path_provider: 2.1.5
  open_filex: 4.7.0
  # Einstellungen persistieren (Theme-Modus)
  shared_preferences: 2.5.3
  # Admin-Zugangsdaten verschluesselt ablegen (Android Keystore / iOS Keychain)
  flutter_secure_storage: 9.2.4
  # Fotos: aufnehmen/waehlen, komprimieren (EXIF/GPS wird dabei entfernt),
  # heruntergeladene Bilder on-device cachen (Egress-schonend, €0-Ziel).
  image_picker: 1.1.2
  flutter_image_compress: 2.3.0
  cached_network_image: 3.4.1
  # Icons
  cupertino_icons: 1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Lint-Regeln – Gate in CI
  flutter_lints: 4.0.0
  # Generiert Android Adaptive Icons (+ Legacy-mipmap-Fallback) zur Build-Zeit
  # aus den PNGs unter brand/render/. Siehe flutter_launcher_icons.yaml.
  flutter_launcher_icons: 0.14.4

flutter:
  uses-material-design: true
  # Datenschutzerklaerung als Asset gebuendelt -> im PrivacyScreen anzeigbar.
  assets:
    - PRIVACY.md
