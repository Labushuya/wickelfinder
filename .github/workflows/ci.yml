name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI muss nur lesen.
permissions:
  contents: read

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter-Version
        run: flutter --version

      - name: Dependencies auflösen
        run: flutter pub get

      - name: Format-Check (Gate)
        run: dart format --output=none --set-exit-if-changed .

      - name: Static Analysis (Gate)
        run: flutter analyze --fatal-infos

      - name: Tests mit Coverage (Gate)
        run: flutter test --coverage

      - name: Coverage-Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: warn
