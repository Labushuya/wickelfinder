name: Release

# Baut bei einem SemVer-Tag (v*) eine Android-APK, testet vorher und
# veröffentlicht die APK als GitHub Release.
on:
  push:
    tags:
      - "v*"

# Braucht Schreibrechte auf contents, um das Release anzulegen.
permissions:
  contents: write

jobs:
  build-release:
    name: Build, Test & Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (für Android-Build)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.5
          cache: true

      - name: Dependencies auflösen
        run: flutter pub get

      - name: Static Analysis (Gate)
        run: flutter analyze --fatal-infos

      - name: Tests (Gate – kein Release bei rotem Test)
        run: flutter test

      # Android-Plattform-Ordner wird generiert (nicht im Repo eingecheckt),
      # damit das Repo frei von generiertem Scaffolding bleibt.
      # --org setzt Namespace/applicationId auf de.wickelfinder.* (statt com.example).
      - name: Android-Plattform generieren
        run: flutter create --platforms=android --org de.wickelfinder --project-name wickelfinder .

      # INTERNET-Permission ins RELEASE-Manifest injizieren.
      # Flutter legt INTERNET nur in src/debug|profile an; ein Release-Build merged
      # NUR src/main -> ohne diesen Schritt kann die APK kein DNS/keine Tiles laden
      # (SocketException 'Failed host lookup' -> weisser Screen). Verifiziert gegen
      # das Flutter-3.35.5-Template. grep-Guard = idempotent (ueberlebt Re-Runs von
      # flutter create); Anker </manifest> ist ueber Flutter-Versionen stabil.
      - name: INTERNET-Permission ins Release-Manifest injizieren
        run: |
          set -euo pipefail
          MANIFEST=android/app/src/main/AndroidManifest.xml
          test -f "$MANIFEST"
          add_perm() {
            local perm="$1"
            if ! grep -q "android.permission.$perm" "$MANIFEST"; then
              sed -i "s#</manifest>#    <uses-permission android:name=\"android.permission.$perm\"/>\n</manifest>#" "$MANIFEST"
              echo "added $perm"
            else
              echo "$perm already present"
            fi
          }
          add_perm INTERNET
          add_perm ACCESS_NETWORK_STATE
          add_perm ACCESS_FINE_LOCATION
          add_perm ACCESS_COARSE_LOCATION
          add_perm REQUEST_INSTALL_PACKAGES
          add_perm CAMERA
          echo '--- uses-permission im Release-Manifest ---'
          grep 'uses-permission' "$MANIFEST"
          # fail-fast: bricht den Build ab, falls der Inject nicht griff
          grep -q 'android.permission.INTERNET' "$MANIFEST"

      # Injiziert Adaptive Icons (+ Legacy-mipmaps) in den soeben generierten
      # android/-Baum. Muss NACH `flutter create` und VOR `flutter build` laufen.
      # Quelle: flutter_launcher_icons.yaml + brand/render/*.png (im Repo).
      - name: App-Icons generieren (Adaptive + Legacy)
        run: dart run flutter_launcher_icons

      # Release-Signierung einrichten: Keystore aus GitHub-Secrets rekonstruieren
      # und eine signingConfig in das (von `flutter create` generierte)
      # build.gradle.kts injizieren. Ohne diesen Schritt signiert Flutter mit dem
      # WECHSELNDEN Debug-Key -> Updates scheitern mit INSTALL_FAILED_UPDATE_
      # INCOMPATIBLE. Fehlt das Keystore-Secret, wird der Schritt uebersprungen
      # (Build bleibt debug-signiert, statt hart zu failen). Idempotent + fail-fast.
      - name: Release-Signierung einrichten
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 fehlt -> APK bleibt debug-signiert (Updates erfordern Deinstallieren)."
            exit 0
          fi

          # 1) Keystore rekonstruieren (nie geloggt).
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.jks

          # 2) key.properties schreiben (Werte aus Secrets, nicht im Log).
          cat > android/key.properties <<EOF
          storeFile=release.jks
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

          # 3) signingConfig in build.gradle.kts (Flutter 3.35 = Kotlin-DSL)
          #    bzw. build.gradle (Groovy-Fallback) idempotent injizieren.
          #    Python-basiert -> robuster als sed fuer die mehrzeiligen Bloecke.
          python3 - <<'PY'
          import re, pathlib, sys
          kts = pathlib.Path("android/app/build.gradle.kts")
          groovy = pathlib.Path("android/app/build.gradle")

          if kts.exists():
              p = kts
              src = p.read_text()
              if 'release.jks' in src or 'keystoreProperties' in src:
                  print("release signing already configured (kts)"); sys.exit(0)
              # Properties laden — direkt nach der Plugins-/erste-Zeile einfuegen.
              header = (
                  'import java.util.Properties\n'
                  'import java.io.FileInputStream\n'
                  'val keystoreProperties = Properties()\n'
                  'val keystorePropertiesFile = rootProject.file("key.properties")\n'
                  'if (keystorePropertiesFile.exists()) {\n'
                  '    keystoreProperties.load(FileInputStream(keystorePropertiesFile))\n'
                  '}\n'
              )
              src = header + src
              # signingConfigs-Block direkt nach "android {" einfuegen.
              sign_block = (
                  '\n    signingConfigs {\n'
                  '        create("release") {\n'
                  '            keyAlias = keystoreProperties["keyAlias"] as String\n'
                  '            keyPassword = keystoreProperties["keyPassword"] as String\n'
                  '            storeFile = file(keystoreProperties["storeFile"] as String)\n'
                  '            storePassword = keystoreProperties["storePassword"] as String\n'
                  '        }\n'
                  '    }\n'
              )
              src = re.sub(r'android\s*\{', 'android {' + sign_block, src, count=1)
              # release-buildType auf die release-signingConfig umstellen.
              src = re.sub(
                  r'signingConfig\s*=\s*signingConfigs\.getByName\("debug"\)',
                  'signingConfig = signingConfigs.getByName("release")',
                  src, count=1)
              p.write_text(src)
              assert 'signingConfigs.getByName("release")' in p.read_text(), "kts inject failed"
              print("release signing configured (kts)")
          elif groovy.exists():
              p = groovy
              src = p.read_text()
              if 'release.jks' in src:
                  print("release signing already configured (groovy)"); sys.exit(0)
              header = (
                  'def keystoreProperties = new Properties()\n'
                  'def keystorePropertiesFile = rootProject.file("key.properties")\n'
                  'if (keystorePropertiesFile.exists()) {\n'
                  '    keystorePropertiesFile.withInputStream { keystoreProperties.load(it) }\n'
                  '}\n'
              )
              src = header + src
              sign_block = (
                  '\n    signingConfigs {\n'
                  '        release {\n'
                  '            keyAlias keystoreProperties["keyAlias"]\n'
                  '            keyPassword keystoreProperties["keyPassword"]\n'
                  '            storeFile file(keystoreProperties["storeFile"])\n'
                  '            storePassword keystoreProperties["storePassword"]\n'
                  '        }\n'
                  '    }\n'
              )
              src = re.sub(r'android\s*\{', 'android {' + sign_block, src, count=1)
              src = re.sub(
                  r'signingConfig\s+signingConfigs\.debug',
                  'signingConfig signingConfigs.release',
                  src, count=1)
              p.write_text(src)
              assert 'signingConfigs.release' in p.read_text(), "groovy inject failed"
              print("release signing configured (groovy)")
          else:
              print("::error::weder build.gradle.kts noch build.gradle gefunden"); sys.exit(1)
          PY

      # Supabase-Zugang wird zur Build-Zeit einkompiliert (--dart-define).
      # Werte aus GitHub-Secrets; anon-key ist client-safe (RLS schuetzt die DB).
      - name: Release-APK bauen
        run: |
          flutter build apk --release \
            --build-name=${GITHUB_REF_NAME#v} \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: APK umbenennen (mit Version)
        run: |
          set -euo pipefail
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             "dist/wickelfinder-${GITHUB_REF_NAME}.apk"

      - name: GitHub Release mit APK erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
          body: |
            ## Wickelfinder ${{ github.ref_name }}

            Automatisch gebaut und getestet via GitHub Actions.

            **Installation:** APK herunterladen und auf dem Android-Gerät öffnen
            (Installation aus unbekannten Quellen ggf. erlauben).

            Alle Tests (`flutter test`) und die statische Analyse
            (`flutter analyze`) sind vor dem Build grün durchgelaufen.

            © OpenStreetMap-Mitwirkende (ODbL) für die Kartendaten.
