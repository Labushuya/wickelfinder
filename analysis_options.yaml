# Lint-Regeln für Wickelfinder.
# flutter_lints als Basis; strenger dort, wo es Wartbarkeit erhöht.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    # Fehlende Doku auf öffentlichen APIs nur als Info, nicht blockierend.
    public_member_api_docs: ignore

linter:
  rules:
    - always_declare_return_types
    - prefer_const_constructors
    - prefer_final_locals
    - avoid_print
    - unawaited_futures
